<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}StoryForge{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root{
      --bg: #0b0f14;
      --panel: #101826;
      --panel-2: #0f1724;
      --text: #e6edf3;
      --muted: #9fb0c2;
      --accent: #7aa2ff;
      --border: rgba(122, 162, 255, 0.18);
    }

    body{
      background: radial-gradient(1200px 600px at 20% 0%, rgba(122,162,255,0.10), transparent 60%),
                  radial-gradient(900px 500px at 80% 10%, rgba(122,162,255,0.08), transparent 55%),
                  var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .sf-nav{
      background: rgba(16,24,38,0.75);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }

    .sf-brand{
      letter-spacing: 0.12em;
      font-weight: 600;
      text-transform: uppercase;
    }

    .sf-panel{
      background: linear-gradient(180deg, rgba(16,24,38,0.75), rgba(15,23,36,0.75));
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    .sf-muted{ color: var(--muted); }

    .sf-chip{
      border: 1px solid var(--border);
      color: var(--text);
      background: rgba(122,162,255,0.08);
      border-radius: 999px;
      padding: 0.15rem 0.6rem;
      font-size: 0.8rem;
      display: inline-flex;
      gap: .35rem;
      align-items: center;
    }

    .sf-major{
      border-left: 4px solid var(--accent);
      padding-left: 12px;
    }

    a { color: var(--accent); }
    a:hover { opacity: 0.9; }

    .sf-divider{
      border-top: 1px solid rgba(159,176,194,0.18);
    }

    .form-select, .form-control {
      background-color: rgba(16,24,38,0.85);
      border: 1px solid var(--border);
      color: var(--text);
    }
    .form-select:focus, .form-control:focus {
      border-color: rgba(122,162,255,0.65);
      box-shadow: 0 0 0 0.15rem rgba(122,162,255,0.15);
    }
    .btn-outline-light {
      border-color: var(--border);
    }
  </style>
</head>
<body>

<nav class="navbar sf-nav">
  <div class="container py-2">
    <span class="sf-brand">StoryForge</span>
    <span class="sf-muted small">Cosmic Archive Interface</span>
  </div>
</nav>

<main class="container my-4">
  {% block content %}{% endblock %}
</main>

</body>
</html>
